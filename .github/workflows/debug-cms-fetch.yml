name: Debug - verify Medicare/Medicaid column mapping

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Download FY2025 SNF cost report zip and check payer-mix column identity
        run: |
          curl -sSL "https://downloads.cms.gov/FILES/HCRIS/SNF10FY2025.ZIP" -o snf2025.zip -w "download HTTP %{http_code}\n"
          mkdir extracted
          unzip -o -q snf2025.zip -d extracted
          NMRC=$(ls extracted/*NMRC*.csv extracted/*nmrc*.csv 2>/dev/null | head -1)
          echo "NMRC file: $NMRC"

          echo ""
          echo "=== national-level sanity check: sum(col00500) vs sum(col00600) vs sum(col00700), line 00100 ==="
          echo "(if col00500=Medicare and col00600=Medicaid, Medicaid should be the larger share for a SNF population)"
          awk -F, '
            $2=="S300001" && $3=="00100" && $4=="00500" { sum500+=$5; n500++ }
            $2=="S300001" && $3=="00100" && $4=="00600" { sum600+=$5; n600++ }
            $2=="S300001" && $3=="00100" && $4=="00700" { sum700+=$5; n700++ }
            END {
              printf "sum(col00500)=%.0f  n=%d  avg=%.1f\n", sum500, n500, sum500/n500
              printf "sum(col00600)=%.0f  n=%d  avg=%.1f\n", sum600, n600, sum600/n600
              printf "sum(col00700)=%.0f  n=%d  avg=%.1f\n", sum700, n700, sum700/n700
              printf "col00500 as pct of col00700 total: %.1f%%\n", 100*sum500/sum700
              printf "col00600 as pct of col00700 total: %.1f%%\n", 100*sum600/sum700
            }
          ' "$NMRC"

          echo ""
          echo "=== how many reports have col00600 (current medicaid mapping) > col00500 (current medicare mapping)? ==="
          echo "(expect: majority, since Medicaid is usually the dominant SNF payer nationally)"
          awk -F, '
            $2=="S300001" && $3=="00100" && $4=="00500" { v500[$1]=$5 }
            $2=="S300001" && $3=="00100" && $4=="00600" { v600[$1]=$5 }
            END {
              total=0; col600bigger=0
              for (r in v500) {
                if (!(r in v600)) continue
                total++
                if (v600[r]+0 > v500[r]+0) col600bigger++
              }
              printf "col00600 > col00500 in %d / %d reports (%.1f%%)\n", col600bigger, total, 100*col600bigger/total
            }
          ' "$NMRC"

          echo ""
          echo "=== all distinct columns on line 00100, with row counts (to check for other payer-mix candidates) ==="
          awk -F, '$2=="S300001" && $3=="00100" { print $4 }' "$NMRC" | sort | uniq -c | sort -rn

          echo ""
          echo "=== sample: first 5 RPT_REC_NUMs' full line-00100 rows, for manual inspection ==="
          for RPT in $(awk -F, '$2=="S300001" && $3=="00100" && $4=="00100" {print $1}' "$NMRC" | head -5); do
            echo "--- rpt=$RPT ---"
            awk -F, -v rpt="$RPT" '$1==rpt && $2=="S300001" && $3=="00100"' "$NMRC" | sort -t, -k4,4
          done
